<html lang="ko">

<title>이사짐캐리 문자 키트</title>
<style>

  :root {
    --bg:        #1a1917;
    --surface:   #2c2c2a;
    --surface2:  #222220;
    --surface3:  #353533;
    --border:    rgba(255,255,255,0.08);
    --border-mid:rgba(255,255,255,0.16);
    --text:      #f1efe8;
    --text-sub:  #b4b2a9;
    --text-hint: #888780;
    --teal:      #1D9E75;
    --teal-bg:   #04342C;
    --teal-text: #9FE1CB;
    --blue:      #378ADD;
    --blue-bg:   #042C53;
    --blue-text: #B5D4F4;
    --amber:     #EF9F27;
    --amber-bg:  #412402;
    --amber-text:#FAC775;
    --red:       #E24B4A;
    --red-bg:    #501313;
    --red-text:  #F7C1C1;
    --purple:    #9B6FE8;
    --purple-bg: #2A1850;
    --purple-text:#D4BAFF;
    --radius:    14px;
    --radius-sm:  8px;

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── 헤더 ── */
  .topbar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 0.85rem 1rem 0;
    position: sticky;
    top: 0;
    z-index: 20;
  }

  .topbar-row1 {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 0.75rem;
  }

  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }
  .title-line1 {
    font-size: 16px;
    font-weight: 900;
    color: var(--text);
    white-space: nowrap;
    letter-spacing: -0.01em;
    display: block;
  }
  .title-row2 {
    display: flex;
    align-items: flex-end;
    gap: 5px;
  }
  .title-line2 {
    font-size: 20px; /* JS가 line1 너비에 맞게 자동 조정 */
    font-weight: 900;
    color: var(--text);
    white-space: nowrap;
    display: inline-block;
  }
  .title-caption {
    font-size: 9px;
    color: var(--text-hint);
    white-space: nowrap;
    margin-bottom: 2px;
    letter-spacing: 0.01em;

    flex-direction: column;
    align-items: center;
    gap: 4px;
    margin-left: auto;

  .name-label {
    font-size: 10px;
    color: var(--text-hint);
    white-space: nowrap;
    letter-spacing: 0.03em;
  }

  .name-pills {
    display: flex;
    background: var(--surface3);
    border-radius: 20px;
    padding: 3px;
    gap: 2px;
  }

  .name-pill {
    font-size: 13px; font-weight: 700;
    font-family: inherit;
    padding: 5px 14px;
    border-radius: 16px;
    border: none;
    background: transparent;
    color: var(--text-sub);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }

  .name-pill.active {
    background: var(--teal);
    color: #fff;
  }

  /* ── 탭 ── */
  .tabs-row {
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    margin-top: 0.1rem;
  }

  .tab {
    font-size: 13px; font-weight: 500;
    font-family: inherit;
    padding: 10px 14px;
    border: none;
    background: transparent;
    color: var(--text-hint);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all .15s;
    flex-shrink: 0;

    border-bottom-color: var(--teal);
    font-weight: 700;
  }

    padding: 1rem 1rem 3rem;

    margin: 0 auto;

    background: var(--surface);

    border-radius: var(--radius);

    padding: 0.8rem 1rem;

  .tag-pre    { background: var(--teal-bg);   color: var(--teal-text); }

/* ── 타이틀 Dynamic Text: line2를 line1 너비에 맞게 font-size 자동 조정 ── */
function fitTitleLines() {
  const line1 = document.querySelector('.title-line1');
  const line2 = document.querySelector('.title-line2');
  if (!line1 || !line2) return;
  line2.style.fontSize = ''; // 초기화
  requestAnimationFrame(() => {
    const w1 = line1.getBoundingClientRect().width;
    const w2 = line2.getBoundingClientRect().width;
    if (w1 > 0 && w2 > 0) {
      const base = parseFloat(getComputedStyle(line2).fontSize);
      line2.style.fontSize = (base * w1 / w2).toFixed(2) + 'px';
    }
  });
}

document.addEventListener('DOMContentLoaded', () => {
  // 폰트 로드 후 재계산 (웹폰트 로딩 지연 대비)
  if (document.fonts) {
    document.fonts.ready.then(fitTitleLines);
  } else {
    setTimeout(fitTitleLines, 300);
  }
  fitTitleLines();
});

/* ── 이름 ── */
const NAMES = [
  { name: '김현규', title: '대표' },
  { name: '김종인', title: '현장매니저' },
];
let selectedNameIdx = 0;

function selectName(idx, btn) {
  selectedNameIdx = idx;
  document.querySelectorAll('.name-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function applyName(text) {
  const { name, title } = NAMES[selectedNameIdx];
  const full = `${title} ${name}`;
  return text
    .replace(/\[팀장명\]/g, full)
    .replace(/\[담당자명\]/g, full)
    .replace(/\[고객명\]\s*고객님/g, '이사짐캐리 고객님')
    .replace(/\[고객명\]/g, '이사짐캐리 고객님');
}

/* ── 즐겨찾기 ── */
let favs = new Set(JSON.parse(localStorage.getItem('sms_favs') || '[]'));

function toggleFav(idx, btn) {
  if (favs.has(idx)) { favs.delete(idx); btn.classList.remove('on'); btn.textContent = '☆'; }
  else               { favs.add(idx);    btn.classList.add('on');  btn.textContent = '★'; }
  localStorage.setItem('sms_favs', JSON.stringify([...favs]));
  if (currentCat === 'fav') render();
}

    title:'고객 부재 시 메시지',
    hint:'[도착시간] 을 교체하세요',
    sms:`안녕하세요, 이사짐캐리입니다.

[도착시간]에 도착했는데 연락이 닿지 않고 있어요.
이 문자 보시면 바로 연락 주시면 감사드릴게요!

전화 어려우시면 문자로 회신 주셔도 됩니다 :)`
  },
];

/* ── 탭 ── */
let currentCat = 'fav';

function filter(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

/* ── 렌더 ── */
function render() {
  const list = document.getElementById('list');
  let items;

  if (currentCat === 'fav') {
    items = [...favs].map(i => ({ d: data[i], idx: i }));
  } else {
    items = data
      .map((d, i) => ({ d, idx: i }))
      .filter(({ d }) => d.cat === currentCat);
  }

  if (!items.length) {
    list.innerHTML = currentCat === 'fav'
      ? '<div class="empty"><strong>☆</strong>즐겨찾기한 문자가 없어요.<br>카드 오른쪽 ☆을 눌러 추가하세요.</div>'
      : '<div class="empty">해당 상황 없음</div>';
    return;
  }

  list.innerHTML = items.map(({ d, idx }) => cardHTML(d, idx)).join('');
}

function cardHTML(d, idx) {
  const isFav = favs.has(idx);
  const smsRendered = applyName(d.sms);
  return `
  <div class="card" id="card-${idx}">
    <div class="card-head">
      <span class="tag ${d.tagClass}">${d.tag}</span>
      <span class="card-title">${d.title}</span>
      <button class="star-btn ${isFav ? 'on' : ''}" onclick="toggleFav(${idx},this)">${isFav ? '★' : '☆'}</button>
    </div>
    <div class="card-body">
      <div class="hint">✏️ ${d.hint}</div>
      <div class="sms-text" id="sms-${idx}">${smsRendered}</div>
      <button class="copy-btn" id="btn-${idx}" onclick="copyText(${idx})">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="4.5" y="4.5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M2.5 9.5V2.5h7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        문자 복사하기
      </button>
    </div>
  </div>`;
}

function copyText(idx) {
  const text = document.getElementById('sms-' + idx).innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btn-' + idx);
    btn.classList.add('done');
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M2 7l3.5 3.5L12 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg> 복사 완료!`;
    setTimeout(() => {
      btn.classList.remove('done');
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <rect x="4.5" y="4.5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
        <path d="M2.5 9.5V2.5h7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg> 문자 복사하기`;
    }, 2500);
  });
}

render();
</script>
</body>
</html>
